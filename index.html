    // Shuffle so birds appear in random positions each load
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Place each bird species exactly once at a random % position
    function spawnBird(layer, bird) {
      const el = document.createElement('img');
      el.className = 'floating-bird';
      el.src = bird.src;
      el.alt = bird.name;
      el.style.width = '60px';
      el.style.height = '60px';
      el.style.left = (3 + Math.random() * 88) + '%';
      el.style.top  = (5 + Math.random() * 82) + '%';
      layer.appendChild(el);
      return el;
    }

    const layer = document.getElementById('bird-layer');
    const birdEls = shuffle([...BIRDS]).map(bird => spawnBird(layer, bird));

    setInterval(() => {
      birdEls.forEach(el => {
        if (Math.random() >= 0.08) return;
        el.classList.remove('hopping', 'flying');
        void el.offsetWidth; // force reflow to restart animation

        if (Math.random() < 0.75) {
          el.classList.add('hopping');
        } else {
          const curX = parseFloat(el.style.left);
          const curY = parseFloat(el.style.top);
          const newX = 3 + Math.random() * 88;
          const newY = 5 + Math.random() * 82;
          const sw = layer.offsetWidth;
          const sh = layer.offsetHeight;
          el.style.setProperty('--fly-end-x', ((newX - curX) / 100 * sw) + 'px');
          el.style.setProperty('--fly-end-y', ((newY - curY) / 100 * sh) + 'px');
          el.classList.add('flying');
          el.addEventListener('animationend', function handler() {
            el.style.left = newX + '%';
            el.style.top  = newY + '%';
            el.style.removeProperty('--fly-end-x');
            el.style.removeProperty('--fly-end-y');
            el.classList.remove('flying');
            el.removeEventListener('animationend', handler);
          });
        }
      });
    }, 2500);
  </script>
